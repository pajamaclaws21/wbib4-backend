<!--

<b>GET /api/id</b> <br>
Obtain a Request ID, needed for /access. 401 means origin not allowed

<br><br>

<b>GET /api/access/str:url/str:id</b> <br>
HTTP request a given website. The URL must be properly formatted; see below. The ID must be obtained from /id. 401 means either origin not allowed or the ID provided has expired.

<br><br>-->

<input id="urlExample" placeholder="https://example.com"><button onclick="document.getElementById('urlFinal').innerText = formatUrl(document.getElementById('urlExample').value)">Format</button>
<p id="urlFinal">Formatted URL will appear here...</p>

<script>
function formatUrl(url){
if(!( url.includes("://") || url.includes("http") )){
alert("url passed to formatter needs a scheme (http/s). Typo?");
} else {
if(url[url.length - 1] != "/"){
url+="/";
};
var scheme = url.split("://")[0];
url = url.split(`${scheme}://`)[1].split("/");
return `${scheme}|${url.join("|")}`;
};
};
</script>
